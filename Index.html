    kras:[{l:'KRA 1 &mdash; RTS Prevention and Order Completion',w:'',c:'w1',kpis:['RTS rate: 10% or less monthly','Order confirmation outreach: 100% daily','Successful delivery rate: 90% or more']},{l:'KRA 2 &mdash; Customer Satisfaction',w:'',c:'w2',kpis:['Response time: within SLA daily','CSAT: meet company target monthly','Concern resolution: 95% or more within SLA']},{l:'KRA 3 &mdash; Engagement and Revenue Protection',w:'',c:'w3',kpis:['Post-delivery follow-up: 100% daily','CRM accuracy: 100% daily','Repeat purchase tracking: consistent weekly']}],
    daily:[{t:'Morning',x:'Send confirmation calls and messages before shipment',w:'Self'},{t:'Morning',x:'Monitor high-risk and unreachable customers',w:'Self'},{t:'Midday',x:'Respond to chats and calls within SLA',w:'Self'},{t:'Afternoon',x:'Post-delivery follow-up and CRM documentation',w:'Self'}],
    weekly:[{t:'Monday',x:'RTS cases review &mdash; root cause identification',w:'Report to Mavi'},{t:'Wednesday',x:'Response time and concern resolution audit',w:'Self'},{t:'Friday',x:'Repeat purchase opportunities and feedback trends',w:'With Mavi'}],
    monthly:[{t:'Week 1',x:'RTS rate and delivery success report',w:'Report to Mavi'},{t:'Week 2',x:'CSAT and response performance',w:'With Mavi'},{t:'Week 4',x:'Process improvements and updated scripts',w:'Submit to Mavi'}],
    money:{now:['RTS Reduction Campaign','Pre-Delivery Reminder System','Confirmation Dashboard'],later:['Customer Experience Playbook','Repeat Purchase Framework','Product Usage FAQ'],future:['Automated SMS Reminder System','Customer Success Journey','Retention and Loyalty Program']},
    support:[]},
};

const ORDER=['gm','brandTL','prodDev','distHead','mktSpec','salesAdmin','csr','brandAsst'];
let selId=null,activeTab='kra',activeView='org';

function drawOrg(){
  const svg=document.getElementById('orgSVG');
  svg.innerHTML='';

  /* All measurements in a 640-unit coordinate space */
  const VW=640, BH=36, RX=7, FS=10, FSS=9;

  /* Y rows ‚Äî tighter gaps */
  const y0=8, y1=72, y2=148, y3=224;

  /* X centres */
  const gmX=VW/2; // 320
  /* L3: evenly spread Brand(110) ProdDev(320) Dist(530) */
  const bX=108, pX=320, dX=532;
  /* L4 under Dist: 3 boxes of width 104, gap 14 */
  const BW4=104, gap4=14;
  const l4tot=3*BW4+2*gap4;
  const l4start=dX-l4tot/2;
  const mX=l4start+BW4/2;
  const jX=l4start+BW4+gap4+BW4/2;
  const rX=l4start+2*(BW4+gap4)+BW4/2;
  /* Louie under Brand */
  const louX=bX;
  /* L3 box width */
  const BW3=148;

  const linesG=document.createElementNS('http://www.w3.org/2000/svg','g');
  svg.appendChild(linesG);

  function ln(x1,y1b,x2,y2b){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1b);l.setAttribute('x2',x2);l.setAttribute('y2',y2b);
    l.setAttribute('stroke','#111');l.setAttribute('stroke-width','1.5');
    linesG.appendChild(l);
  }

  function bx(id,cx,y,w,h,title,name,color,click){
    const isSel=id===selId;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    if(click){g.style.cursor='pointer';g.addEventListener('click',()=>pick(id));}
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',cx-w/2);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',h);
    r.setAttribute('rx',RX);r.setAttribute('fill',isSel?color:'#f8f8f8');
    r.setAttribute('stroke',isSel?color:'#222');r.setAttribute('stroke-width',isSel?'2.5':'1.5');
    g.appendChild(r);
    const t1=document.createElementNS('http://www.w3.org/2000/svg','text');
    t1.setAttribute('x',cx);t1.setAttribute('y',y+h*0.35);t1.setAttribute('text-anchor','middle');
    t1.setAttribute('dominant-baseline','middle');t1.setAttribute('font-family','Georgia,serif');
    t1.setAttribute('font-size',FS);t1.setAttribute('font-weight','700');
    t1.setAttribute('fill',isSel?'#fff':color);t1.textContent=title;g.appendChild(t1);
    const t2=document.createElementNS('http://www.w3.org/2000/svg','text');
    t2.setAttribute('x',cx);t2.setAttribute('y',y+h*0.72);t2.setAttribute('text-anchor','middle');
    t2.setAttribute('dominant-baseline','middle');t2.setAttribute('font-family','Georgia,serif');
    t2.setAttribute('font-size',FSS);t2.setAttribute('font-weight','400');
    t2.setAttribute('fill',isSel?'rgba(255,255,255,.85)':'#555');t2.textContent=name;g.appendChild(t2);
    svg.appendChild(g);
    return{top:{x:cx,y},bot:{x:cx,y:y+h}};
  }

  /* CEO */
  const ceo=bx('ceo',gmX,y0,130,BH,'CEO','Sir Jayson','#555',false);
  /* GM */
  const gm=bx('gm',gmX,y1,150,BH,'General Manager','Jen',DATA.gm.color,true);
  ln(gmX,ceo.bot.y,gmX,y1);

  /* L3 bar */
  const bar2=y2-18;
  ln(gmX,gm.bot.y,gmX,bar2);
  ln(bX,bar2,dX,bar2);
  ln(bX,bar2,bX,y2);
  ln(pX,bar2,pX,y2);
  ln(dX,bar2,dX,y2);

  bx('brandTL',bX,y2,BW3,BH,'Brand Team Leader','Ariane',DATA.brandTL.color,true);
  bx('prodDev',pX,y2,BW3,BH,'Product Development','Hiring',DATA.prodDev.color,true);
  bx('distHead',dX,y2,BW3,BH,'Distributor Head','Mavi',DATA.distHead.color,true);

  /* Louie */
  ln(louX,y2+BH,louX,y3);
  bx('brandAsst',louX,y3,BW3,BH,'Video Editor / Graphics','Louie',DATA.brandAsst.color,true);

  /* L4 bar */
  const bar4=y3-18;
  ln(dX,y2+BH,dX,bar4);
  ln(mX,bar4,rX,bar4);
  ln(mX,bar4,mX,y3);
  ln(jX,bar4,jX,y3);
  ln(rX,bar4,rX,y3);

  bx('mktSpec',mX,y3,BW4,BH,'Marketing Specialist','Mira',DATA.mktSpec.color,true);
  bx('salesAdmin',jX,y3,BW4,BH,'Sales Admin','Joan',DATA.salesAdmin.color,true);
  bx('csr',rX,y3,BW4,BH,'CSR','Rosalie',DATA.csr.color,true);

  /* Legend */
  const legs=[['General Manager','#E02E20'],['Brand and Marketing','#854F0B'],['Product Development','#0F6E56'],['Distribution Sales','#1B2A4A']];
  const legY=y3+BH+22;
  let lx=10;
  legs.forEach(([label,col])=>{
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',lx+4);c.setAttribute('cy',legY);c.setAttribute('r',4);c.setAttribute('fill',col);
    svg.appendChild(c);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',lx+12);t.setAttribute('y',legY);t.setAttribute('dominant-baseline','middle');
    t.setAttribute('font-family','Georgia,serif');t.setAttribute('font-size','9');t.setAttribute('fill','#666');
    t.textContent=label;svg.appendChild(t);
    lx+=label.length*5.4+22;
  });

  svg.setAttribute('viewBox',`0 0 ${VW} ${legY+14}`);
}

function buildRoleGrid(){
  document.getElementById('roleGrid').innerHTML=ORDER.map(id=>{
    const r=DATA[id];
    return `<div class="rcard${selId===id?' sel':''}" onclick="pick('${id}')">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:${r.color};flex-shrink:0"></div><span class="rcard-title">${r.title}</span></div>
      <div class="rcard-name">${r.name}</div></div>`;
  }).join('');
}

function pick(id){
  if(!DATA[id])return;
  selId=id;activeTab='kra';
  if(activeView==='org'){drawOrg();document.getElementById('orgPanel').style.display='block';showPanel('orgP');}
  else{buildRoleGrid();document.getElementById('rolesPanel').style.display='block';showPanel('rolesP');}
}

function showPanel(p){
  const r=DATA[selId];
  document.getElementById(p+'Head').innerHTML=`<div class="dp-dot" style="background:${r.color}"></div><div><div class="dp-title">${r.title} &mdash; ${r.name}</div><div class="dp-sub">${r.dept}</div></div>`;
  const tabs=[['kra','KRAs and KPIs'],['daily','Daily'],['weekly','Weekly'],['monthly','Monthly'],['money','Money Now / Later / Future']];
  if(r.support&&r.support.length)tabs.push(['support','How to Support']);
  document.getElementById(p+'Tabs').innerHTML=tabs.map(([t,l])=>`<div class="dp-tab${activeTab===t?' active':''}" onclick="switchTab('${t}')">${l}</div>`).join('');
  buildBody(p+'Body');
}

function switchTab(t){
  activeTab=t;
  ['orgP','rolesP'].forEach(p=>{
    const el=document.getElementById(p+'Tabs');
    if(el){const order=['kra','daily','weekly','monthly','money','support'];el.querySelectorAll('.dp-tab').forEach((d,i)=>d.classList.toggle('active',order[i]===t));}
    const b=document.getElementById(p+'Body');if(b)buildBody(p+'Body');
  });
}

function buildBody(bid){
  const r=DATA[selId],b=document.getElementById(bid);
  if(!b||!r)return;
  if(activeTab==='kra'){
    b.innerHTML=r.kras.map(k=>`<div class="kra-card"><div class="kra-hd"><span class="kra-lbl">${k.l}</span>${k.w?`<span class="wbadge ${k.c}">${k.w}</span>`:''}</div>${k.kpis.map(p=>`<div class="kpi-r"><div class="kpi-dot"></div><div>${p}</div></div>`).join('')}</div>`).join('');
  } else if(['daily','weekly','monthly'].includes(activeTab)){
    const labels={daily:'Daily non-negotiables',weekly:'Weekly cadence',monthly:'Monthly rhythm'};
    const arr={daily:r.daily,weekly:r.weekly,monthly:r.monthly}[activeTab];
    b.innerHTML=`<div class="flow-lbl">${labels[activeTab]}</div>`+arr.map(i=>`<div class="flow-item"><div class="flow-time">${i.t}</div><div><div class="flow-text">${i.x}</div><div class="flow-who">${i.w}</div></div></div>`).join('');
  } else if(activeTab==='money'){
    b.innerHTML=`<div class="money-grid"><div class="money-card mnow"><div class="money-tag mtagnow">Money Now &mdash; 0 to 30 Days</div>${r.money.now.map(x=>`<div class="money-item">${x}</div>`).join('')}</div><div class="money-card mlater"><div class="money-tag mtaglater">Money Later &mdash; 30 to 90 Days</div>${r.money.later.map(x=>`<div class="money-item">${x}</div>`).join('')}</div><div class="money-card mfuture"><div class="money-tag mtagfuture">Money Future &mdash; 3 to 12 Months</div>${r.money.future.map(x=>`<div class="money-item">${x}</div>`).join('')}</div></div>`;
  } else if(activeTab==='support'){
    b.innerHTML=`<div class="flow-lbl" style="margin-bottom:8px">How you support your team</div><div class="sup-grid">${r.support.map(s=>`<div class="sup-card"><div class="sup-name"><div class="sup-dot" style="background:${s.color}"></div>${s.name}</div>${s.items.map(i=>`<div class="sup-item">&bull; ${i}</div>`).join('')}</div>`).join('')}</div>`;
  }
}

function setView(v){
  activeView=v;
  document.getElementById('orgView').style.display=v==='org'?'block':'none';
  document.getElementById('rolesView').style.display=v==='roles'?'block':'none';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',
    (v==='org'&&b.textContent.includes('Org'))||(v==='roles'&&b.textContent.includes('All'))));
  if(v==='roles'){buildRoleGrid();if(selId)showPanel('rolesP');}
}

drawOrg();
</script>
